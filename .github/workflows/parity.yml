name: Parity

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Stratum releases every few days; a weekly run catches drift between pushes.
    - cron: '0 6 * * 1'

env:
  VS_VERSION: '1.22.3'
  STRATUM_TAG: 'v1.22.3-stratum.15'

jobs:
  parity:
    strategy:
      fail-fast: false
      matrix:
        flavor: [vanilla, stratum]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache game install
        id: cache-install
        uses: actions/cache@v4
        with:
          path: ~/install/${{ matrix.flavor }}
          key: install-${{ matrix.flavor }}-${{ env.VS_VERSION }}-${{ env.STRATUM_TAG }}

      - name: Install vanilla server
        if: matrix.flavor == 'vanilla' && steps.cache-install.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/install/vanilla
          curl -fsSL "https://cdn.vintagestory.at/gamefiles/stable/vs_server_linux-x64_${VS_VERSION}.tar.gz" \
            | tar -xz -C ~/install/vanilla
          # The tarball may wrap the content in a server/ folder.
          if [ -d ~/install/vanilla/server ]; then
            mv ~/install/vanilla/server/* ~/install/vanilla/
            rmdir ~/install/vanilla/server
          fi

      - name: Install and bootstrap Stratum server
        if: matrix.flavor == 'stratum' && steps.cache-install.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/install/stratum && cd ~/install/stratum
          ver="${STRATUM_TAG#v}"
          curl -fsSLO "https://github.com/StratumServer/Stratum/releases/download/${STRATUM_TAG}/stratum-${ver}-linux-x64.zip"
          python3 -m zipfile -e "stratum-${ver}-linux-x64.zip" .
          rm "stratum-${ver}-linux-x64.zip"
          chmod +x StratumServer
          # First launch downloads the vanilla assets and applies the Stratum overlay,
          # then starts serving; kill it once it reports ready.
          ./StratumServer --dataPath /tmp/stratum-boot > boot.log 2>&1 &
          boot_pid=$!
          for i in $(seq 1 150); do
            grep -q "Dedicated Server now running" boot.log && break
            kill -0 "$boot_pid" 2>/dev/null || { cat boot.log; exit 1; }
            sleep 4
          done
          grep -q "Dedicated Server now running" boot.log || { cat boot.log; exit 1; }
          kill -INT "$boot_pid"; sleep 5; kill "$boot_pid" 2>/dev/null || true
          rm -rf /tmp/stratum-boot

      - name: Run scenarios
        run: |
          export VINTAGE_STORY="$HOME/install/${{ matrix.flavor }}"
          run_suite() {
            dotnet test scenarios/StratumParity.Scenarios -c Release \
              --logger "trx;LogFileName=${{ matrix.flavor }}.trx" \
              --results-directory results 2>&1 | tee test-output.log
            return "${PIPESTATUS[0]}"
          }
          if ! run_suite; then
            # A known engine race (StratumServer/Stratum#151) can kill the test host
            # during a server BOOT: BuildServerAssetsPacket enumerates blocks/items on a
            # pool thread while late boot work mutates them. It surfaces to the test host
            # as "SendServerAssets failed" and to the server log as "Collection was
            # modified". Retry once, but only on that exact signature so real regressions
            # keep failing loudly.
            if grep -qE "Collection was modified|SendServerAssets failed" test-output.log; then
              echo "::warning::known engine race (Stratum#151) killed the test host; retrying once"
              rm -rf results
              run_suite
            else
              exit 1
            fi
          fi

      - name: Upload TRX
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trx-${{ matrix.flavor }}
          path: results/*.trx
          # Re-run attempts share the run's artifact namespace; without this, a retried
          # leg 409s on the upload and can never go green.
          overwrite: true

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs-${{ matrix.flavor }}
          path: /tmp/atlas/*/Logs/*.log
          if-no-files-found: ignore
          overwrite: true

  compare:
    needs: parity
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: results
          merge-multiple: true

      - name: Diff outcomes
        run: |
          python3 scripts/diff_trx.py results/vanilla.trx results/stratum.trx --markdown \
            >> "$GITHUB_STEP_SUMMARY" || true
          python3 scripts/diff_trx.py results/vanilla.trx results/stratum.trx

  publish:
    # Append this run to the dashboard history and republish the site. main only. Runs
    # even when the suite or the comparison failed: a red run must show up as a red tile
    # on the dashboard, not silently vanish from the history. Scheduled sweeps are
    # recorded too (that is the drift signal the cron exists for), stamped with the run
    # time since their commit is old news.
    needs: compare
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site-out

      - uses: actions/download-artifact@v4
        # A run that died before uploading anything must not block the site republish;
        # the guard below handles the missing files.
        continue-on-error: true
        with:
          path: results
          merge-multiple: true

      - name: Append this run and publish
        # No concurrency group: at most one pending job per group means a third publish
        # entering the group CANCELS the pending one, silently dropping its history
        # entry. Instead every publish races freely and the loser of a push race resets
        # onto the fresh branch and replays its append (idempotent per run id).
        # The checkout action leaves authenticated credentials in the gh-pages clone,
        # so the push needs no secret handling here.
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            run_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          else
            run_date="$(TZ=UTC0 git show -s --format=%cd --date=format-local:'%Y-%m-%dT%H:%M:%SZ' ${{ github.sha }})"
          fi
          git -C site-out config user.name "github-actions[bot]"
          git -C site-out config user.email "github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git -C site-out fetch origin gh-pages
            git -C site-out reset --hard origin/gh-pages
            if [ -f results/vanilla.trx ] || [ -f results/stratum.trx ]; then
              # --missing-ok: a flavor whose suite never produced results is recorded as
              # an empty side (red entry), not silently skipped.
              mkdir -p site-out/data
              python3 scripts/history_append.py results/vanilla.trx results/stratum.trx \
                --missing-ok \
                --history site-out/data/runs.json \
                --run-id "${{ github.run_id }}" \
                --sha "${{ github.sha }}" \
                --date "${run_date}" \
                --stratum-tag "${STRATUM_TAG}" \
                --event "${{ github.event_name }}"
            else
              echo "::warning::no TRX at all (run died before testing); republishing the site without a new entry"
            fi
            cp site/index.html site-out/index.html
            touch site-out/.nojekyll
            git -C site-out add -A
            git -C site-out diff --cached --quiet || git -C site-out commit -q -m "dashboard: run ${{ github.run_id }}"
            if git -C site-out push origin HEAD:gh-pages; then
              exit 0
            fi
            echo "::warning::gh-pages push lost a race (attempt ${attempt}); replaying on the fresh branch"
          done
          echo "gh-pages push failed after 3 attempts"
          exit 1
